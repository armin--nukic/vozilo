services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - .env
    ports:
      - "${FRONTEND_BIND_IP:-0.0.0.0}:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    ports:
      - "${BACKEND_BIND_IP:-0.0.0.0}:${BACKEND_PORT:-3001}:3001"
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vozilo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vozilo}
      POSTGRES_DB: ${POSTGRES_DB:-vozilo}
    ports:
      - "${POSTGRES_BIND_IP:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_BIND_IP:-0.0.0.0}:${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vozilo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-vozilo123}
    ports:
      - "${MINIO_BIND_IP:-0.0.0.0}:${MINIO_PORT_PUBLIC:-9000}:9000"
      - "${MINIO_CONSOLE_BIND_IP:-0.0.0.0}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
